name: cos_pet_app
description: Flutter APK builder for COS pet mood lesson app
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/avatar.png

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/avatar.png"
